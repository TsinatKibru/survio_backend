{% extends "admin/base.html" %}
{% load i18n %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'survio_admin:index' %}">{{ site_header|default:_('Django administration') }}</a></h1>
{% endblock %}


{% block extrastyle %}
{{ block.super }}
<script>
  // Ensure the desktop Django sidebar is closed/pulled-in by default
  if (!localStorage.getItem('django.admin.navSidebarIsOpen')) {
      localStorage.setItem('django.admin.navSidebarIsOpen', 'false');
  }
</script>
<style>
  /* Base cleanup for older Django versions */
  .readonly-password-hash-summary,
  .field-password ul {
    display: none !important;
  }

  .vTextField, 
  .vLargeTextField, 
  .vURLField, 
  .vEmailField, 
  .vNumberField, 
  .vDateField, 
  .vTimeField,
  div.form-row input[type="text"]:not(.selector input), 
  div.form-row input[type="password"], 
  div.form-row select:not(.selector select), 
  div.form-row textarea:not(.selector textarea),
  .form-row .related-widget-wrapper {
    width: 100% !important;
    max-width: 380px !important;
    box-sizing: border-box !important;
  }
  
  /* Reset for Django's multi-select selector widget to prevent layout breakage */
  .selector select, 
  .selector input {
    width: inherit !important;
    max-width: inherit !important;
  }

  .form-row select {
    padding-right: 32px !important; /* spacing for arrow */
  }

  /* Fix for related widget wrappers (with icons like + or edit) */
  .form-row .related-widget-wrapper select {
    width: 100% !important;
    max-width: none !important; /* let wrapper control it */
  }
  
  .form-row .related-widget-wrapper {
    display: inline-flex;
    align-items: center;
  }
</style>
<script>
document.addEventListener('DOMContentLoaded', function () {
  // Hide the Django 5.x password hash paragraph robustly
  var pwField = document.querySelector('.field-password');
  if (pwField) {
    var bTags = pwField.querySelectorAll('strong, b');
    for (var i = 0; i < bTags.length; i++) {
        if (bTags[i].textContent.toLowerCase().includes('algorithm')) {
            var container = bTags[i].closest('p') || bTags[i].parentElement;
            if (container) container.style.display = 'none';
            break;
        }
    }
  }

  var analyticsHTML =
    '<div class="app-analytics module">' +
      '<table>' +
        '<caption>' +
          '<a href="#" class="section" style="cursor:default;pointer-events:none;color:inherit;">Analytics</a>' +
        '</caption>' +
        '<tr>' +
          '<th scope="row">' +
            '<a href="/admin/industry-performance/" style="display:flex;align-items:center;">' +
              '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right:8px;opacity:.7;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>' +
              'Industry Performance' +
            '</a>' +
          '</th>' +
        '</tr>' +
        '<tr>' +
          '<th scope="row">' +
            '<a href="/admin/question-analytics/" style="display:flex;align-items:center;">' +
              '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right:8px;opacity:.7;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>' +
              'Strategic Data Explorer' +
            '</a>' +
          '</th>' +
        '</tr>' +
        '<tr>' +
          '<th scope="row">' +
            '<a href="/admin/data-comparison/" style="display:flex;align-items:center;">' +
              '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right:8px;opacity:.7;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l-2 2M9 6l2 2M15 5v14l2-2m-2 2l-2-2"/></svg>' +
              'Data Comparison' +
            '</a>' +
          '</th>' +
        '</tr>' +
      '</table>' +
    '</div>';

  // Inject into Django's desktop sidebar
  var sidebar = document.querySelector('#nav-sidebar .module');
  if (sidebar) {
    sidebar.insertAdjacentHTML('beforebegin', analyticsHTML);
  } else {
    // Fallback: prepend to the sidebar container itself
    var sidebarContainer = document.getElementById('nav-sidebar');
    if (sidebarContainer) sidebarContainer.insertAdjacentHTML('afterbegin', analyticsHTML);
  }
});
</script>
<style>
/* ── Mobile Slide-in Drawer ─────────────────────────────── */
@media (max-width: 1024px) {

  /* FAB toggle button */
  #mob-nav-btn {
    position: fixed;
    bottom: 80px;
    left: 16px;
    z-index: 9999;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--primary, #417690);
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.18s;
  }
  #mob-nav-btn:active { transform: scale(0.9); }

  /* Backdrop */
  #mob-nav-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9997;
  }
  #mob-nav-backdrop.open { display: block; }

  /* Drawer panel */
  #mob-nav-drawer {
    position: fixed;
    top: 0;
    left: -300px;
    width: 270px;
    height: 100%;
    z-index: 9998;
    background: var(--darkened-bg, #fff);
    box-shadow: 4px 0 30px rgba(0,0,0,0.25);
    transition: left 0.28s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  #mob-nav-drawer.open { left: 0; }

  /* Drawer header */
  #mob-nav-drawer .drawer-header {
    padding: 16px;
    background: var(--primary, #417690);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  /* Nav link styles */
  #mob-nav-drawer .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #mob-nav-drawer .drawer-body a,
  #mob-nav-drawer .drawer-body th a {
    display: block;
    padding: 9px 20px;
    color: var(--body-fg, #333) !important;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  #mob-nav-drawer .drawer-body a:hover {
    background: var(--body-bg, #f5f5f5);
    border-left-color: var(--primary, #417690);
  }
  #mob-nav-drawer .drawer-body caption,
  #mob-nav-drawer .drawer-body th {
    padding: 10px 16px 4px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--body-quiet-color, #888);
    text-align: left;
  }

  /* Don't shift content or show Django's own sidebar */
  #main { margin-left: 0 !important; }
  #nav-sidebar { display: none !important; }
  #nav-sidebar-toggle { display: none !important; }
}

@media (min-width: 1025px) {
  #mob-nav-btn { display: none !important; }
  #mob-nav-drawer { display: none !important; }
  #mob-nav-backdrop { display: none !important; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (window.innerWidth > 1024) return;

  var btn = document.getElementById('mob-nav-btn');
  var drawer = document.getElementById('mob-nav-drawer');
  var backdrop = document.getElementById('mob-nav-backdrop');
  var drawerBody = document.getElementById('mob-drawer-body');
  if (!btn || !drawer || !backdrop) return;

  // Clone Django's nav-sidebar content into the drawer
  var djangoSidebar = document.getElementById('nav-sidebar');
  if (djangoSidebar && drawerBody) {
    drawerBody.innerHTML = djangoSidebar.innerHTML;
    // Re-attach click handlers after clone
    drawerBody.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', function () { setTimeout(close, 120); });
    });
  }

  function open() {
    drawer.classList.add('open');
    backdrop.classList.add('open');
    btn.textContent = '✕';
  }
  function close() {
    drawer.classList.remove('open');
    backdrop.classList.remove('open');
    btn.textContent = '☰';
  }

  btn.addEventListener('click', function () {
    drawer.classList.contains('open') ? close() : open();
  });
  backdrop.addEventListener('click', close);
});
</script>
{% endblock %}

{% block footer %}
{{ block.super }}
<!-- Backdrop -->
<div id="mob-nav-backdrop"></div>

<!-- Slide-in drawer — content cloned from nav-sidebar by JS -->
<div id="mob-nav-drawer">
  <div class="drawer-header">
    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
    {{ site_header|default:"Admin Navigation" }}
  </div>
  <div class="drawer-body" id="mob-drawer-body"></div>
</div>

<!-- FAB -->
<button id="mob-nav-btn" aria-label="Open navigation">☰</button>
{% endblock %}
